    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap');
        
        body {
            background-color: #020617;
            color: #22d3ee;
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        .hud-font { font-family: 'Orbitron', sans-serif; }

        /* Spaceship Grid Effect */
        .space-grid {
            background-image: 
                linear-gradient(rgba(34, 211, 238, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 211, 238, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
        }

        /* Scanning Animation */
        .laser-line {
            height: 1px;
            background: #22d3ee;
            position: absolute;
            width: 100%;
            z-index: 10;
            box-shadow: 0 0 20px #22d3ee;
            animation: moveLaser 4s ease-in-out infinite;
        }

        @keyframes moveLaser {
            0% { top: 10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 90%; opacity: 0; }
        }

        /* Rotating HUD Element */
        .rotate-hud {
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .glass {
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(34, 211, 238, 0.3);
        }

        /* Compass/Targeting Reticle */
        .reticle-corner {
            width: 40px;
            height: 40px;
            border-color: #22d3ee;
            position: absolute;
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- STEALTH AUTHORIZATION OVERLAY -->
    <div id="auth-screen" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-8 transition-opacity duration-1000 space-grid">
        <div class="w-full max-w-sm p-10 border-2 border-cyan-500/30 bg-slate-900/90 rounded-3xl text-center backdrop-blur-xl">
            <div class="mb-8 rotate-hud inline-block">
                <svg width="60" height="60" viewBox="0 0 100 100" class="text-cyan-400">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="10 5"/>
                    <path d="M50 5 L50 15 M95 50 L85 50 M50 95 L50 85 M5 50 L15 50" stroke="currentColor" stroke-width="2"/>
                </svg>
            </div>
            <h2 class="text-2xl font-bold hud-font mb-2 tracking-widest text-white">SPACESHIP_INIT</h2>
            <p class="text-[10px] text-cyan-600 uppercase tracking-[0.5em] mb-10">Syncing Pilot Neural Link</p>
            
            <input type="password" id="api-key-input" placeholder="INPUT_CRYPTO_KEY" 
                class="w-full bg-slate-950 border border-cyan-500/50 p-4 rounded-xl text-cyan-400 font-mono text-center mb-6 focus:border-cyan-400 outline-none">
            
            <button onclick="saveKey()" class="w-full py-4 bg-cyan-500 text-slate-950 font-bold rounded-xl uppercase hud-font text-sm tracking-widest hover:bg-cyan-400 transition-all active:scale-95 shadow-lg shadow-cyan-500/20">
                Engage Systems
            </button>
        </div>
    </div>

    <!-- MAIN COCKPIT VIEW -->
    <div class="relative flex-grow h-[65vh] bg-black">
        <video id="v" autoplay playsinline muted class="w-full h-full object-cover opacity-60 grayscale-[40%]"></video>
        <canvas id="cap" class="hidden"></canvas>

        <!-- SPACESHIP HUD OVERLAYS -->
        <div class="absolute inset-0 pointer-events-none">
            <!-- Center Reticle -->
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-72 h-72">
                <div class="laser-line"></div>
                <div class="reticle-corner top-0 left-0 border-t-2 border-l-2"></div>
                <div class="reticle-corner top-0 right-0 border-t-2 border-r-2"></div>
                <div class="reticle-corner bottom-0 left-0 border-b-2 border-l-2"></div>
                <div class="reticle-corner bottom-0 right-0 border-b-2 border-r-2"></div>
                
                <!-- Crosshair -->
                <div class="absolute top-1/2 left-0 w-full h-[1px] bg-cyan-500/20"></div>
                <div class="absolute left-1/2 top-0 h-full w-[1px] bg-cyan-500/20"></div>
            </div>

            <!-- Telemetry -->
            <div class="absolute top-10 left-10 text-[10px] space-y-2 uppercase opacity-70">
                <div class="flex items-center gap-2"><div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div> SIGNAL: STABLE</div>
                <div>OBJ_TRACKER: ENGAGED</div>
                <div>COORD: 40.7128° N</div>
            </div>

            <div class="absolute bottom-10 right-10 text-[10px] text-right uppercase opacity-70">
                <div class="hud-font text-white mb-1">G-CORE X1 SHIP_OS</div>
                <div>POWER: 21% NOMINAL</div>
                <div>TEMP: 340K</div>
            </div>
        </div>

        <!-- AI LOADING -->
        <div id="load" class="hidden absolute inset-0 bg-slate-950/80 flex flex-col items-center justify-center z-50">
            <div class="w-20 h-20 border-2 border-cyan-900 rounded-full relative">
                <div class="absolute inset-0 border-t-2 border-cyan-400 rounded-full animate-spin"></div>
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[8px] animate-pulse">COMPUTING</div>
            </div>
            <p class="mt-8 text-[10px] tracking-[1em] animate-pulse text-cyan-400 font-bold uppercase">Parsing Visual Matrix</p>
        </div>
    </div>

    <!-- SHIP CONSOLE -->
    <div class="flex-grow glass p-8 flex flex-col overflow-hidden">
        
        <div id="idle" class="flex flex-col items-center justify-center flex-1">
            <div class="text-center mb-10">
                <h1 class="text-2xl font-bold tracking-[0.4em] text-white hud-font mb-2">NEURAL_SCANNER</h1>
                <p class="text-[9px] text-cyan-700 uppercase tracking-widest font-mono">Integrated Component Reasoning v2.5</p>
            </div>
            
            <button onclick="scan()" class="w-full max-w-sm py-5 border-2 border-cyan-400 text-cyan-400 font-bold rounded-2xl flex items-center justify-center gap-4 active:scale-95 transition-all uppercase tracking-[0.3em] hud-font text-sm bg-cyan-900/10 shadow-lg shadow-cyan-500/5">
                Execute Scan Sequence
            </button>
            
            <button onclick="localStorage.removeItem('gk'); location.reload();" class="mt-10 text-[8px] text-slate-700 uppercase tracking-widest hover:text-red-500">Purge Authorization Link</button>
        </div>

        <!-- ANALYSIS REPORT -->
        <div id="report" class="hidden flex flex-col h-full overflow-hidden">
            <div class="flex justify-between items-center mb-6 border-b border-cyan-900/50 pb-4">
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 bg-cyan-500 rounded-sm rotate-45"></div>
                    <span class="text-sm font-bold tracking-widest text-white hud-font italic uppercase">Visual Analysis Data</span>
                </div>
                <button onclick="reset()" class="text-[9px] text-cyan-500 border border-cyan-500/30 px-4 py-2 rounded-lg uppercase font-bold hover:bg-cyan-500 hover:text-slate-950 transition-colors">Abort_Report</button>
            </div>
            
            <div class="flex-1 overflow-y-auto pr-2" id="scroll-area">
                <div id="text-out" class="text-xs leading-relaxed text-slate-300 space-y-4"></div>
            </div>

            <div class="mt-6 pt-4 border-t border-cyan-900/50 flex gap-4">
                <button onclick="copy()" class="flex-1 py-3 bg-slate-900 text-[10px] text-cyan-600 rounded-xl uppercase font-bold border border-cyan-900/50">Export to Log</button>
                <button onclick="search()" class="flex-1 py-3 bg-slate-900 text-[10px] text-cyan-600 rounded-xl uppercase font-bold border border-cyan-900/50">Query Database</button>
            </div>
        </div>
    </div>

    <script>
        const v = document.getElementById('v');
        const c = document.getElementById('cap');
        const auth = document.getElementById('auth-screen');
        const idle = document.getElementById('idle');
        const rpt = document.getElementById('report');
        const ld = document.getElementById('load');
        const out = document.getElementById('text-out');

        window.onload = () => {
            const key = localStorage.getItem('gk');
            if (key) {
                auth.style.opacity = '0';
                setTimeout(() => auth.style.display = 'none', 1000);
                initCam();
            }
        };

        function saveKey() {
            const val = document.getElementById('api-key-input').value.trim();
            if (val) { localStorage.setItem('gk', val); location.reload(); }
        }

        async function initCam() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
                });
                v.srcObject = s;
            } catch (err) { alert("COCKPIT_ERROR: Optical sensor link failed."); }
        }

        async function scan() {
            const key = localStorage.getItem('gk');
            if (!key) return;

            ld.classList.remove('hidden');
            
            c.width = v.videoWidth;
            c.height = v.videoHeight;
            const ctx = c.getContext('2d');
            ctx.drawImage(v, 0, 0);
            const b64 = c.toDataURL('image/png').split(',')[1];

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${key}`;

            const prompt = `AI SHIP COMPUTER MODE. Identify electronic component. 
            Package: visual. Pins: visual. Context: ECE Expert. 
            Format: Heading: Name. Section: Function. Section: Specs. Section: Pinout logic. Section: Context of use.
            Tone: High-tech ship computer report.`;

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: b64 } }] }]
                    })
                });
                
                const data = await res.json();
                if (data.error) throw new Error(data.error.message);

                const txt = data.candidates[0].content.parts[0].text;
                out.innerHTML = txt.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b class="text-cyan-200">$1</b>');

                idle.classList.add('hidden');
                rpt.classList.remove('hidden');
            } catch (err) {
                alert("COMMS_FAULT: " + err.message);
                if (err.message.includes('API_KEY_INVALID')) { localStorage.removeItem('gk'); location.reload(); }
            } finally { ld.classList.add('hidden'); }
        }

        function reset() { rpt.classList.add('hidden'); idle.classList.remove('hidden'); out.innerHTML = ""; }
        function copy() { 
            const t = out.innerText;
            const b = document.createElement('textarea'); b.value = t; document.body.appendChild(b); b.select();
            document.execCommand('copy'); document.body.removeChild(b);
            alert("LOG_SAVED: Cockpit log updated."); 
        }
        function search() {
            const part = out.innerText.split('\n')[0] || "Component";
            window.open(`https://www.google.com/search?q=${encodeURIComponent(part + " datasheet pdf")}`, '_blank');
        }
    </script>
</body>
</html>
