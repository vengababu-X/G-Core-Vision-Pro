
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G-CORE | Omni-Vision Universal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            background-color: #000;
            color: #00f2ff;
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        .font-hud { font-family: 'Orbitron', sans-serif; }

        /* Scanning Reticle Animation */
        .reticle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 260px;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        .scan-bar {
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, #00f2ff, transparent);
            position: absolute;
            top: 0;
            box-shadow: 0 0 15px #00f2ff;
            animation: scanLoop 3s ease-in-out infinite;
        }

        @keyframes scanLoop {
            0%, 100% { top: 5%; opacity: 0; }
            50% { top: 95%; opacity: 1; }
        }

        .glass {
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(25px);
            border-top: 2px solid rgba(0, 242, 255, 0.3);
        }

        /* Mobile optimization for S20 Ultra */
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(1.1) contrast(1.1);
        }

        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border-color: #00f2ff;
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- UNIVERSAL KEY AUTH (LocalStorage Only) -->
    <div id="gatekeeper" class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-6 transition-all duration-1000">
        <div class="w-full max-w-sm p-8 border-2 border-cyan-900 bg-slate-950 rounded-[2rem] text-center shadow-[0_0_60px_rgba(0,242,255,0.1)]">
            <div class="mb-6 animate-pulse">
                <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" class="mx-auto"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <h1 class="text-xl font-bold font-hud mb-1 tracking-widest">OMNI_LINK</h1>
            <p class="text-[9px] text-cyan-800 uppercase tracking-[0.5em] mb-8">Universal API Integration</p>
            
            <input type="password" id="master-key" placeholder="PASTE_ANY_GEMINI_KEY" 
                class="w-full bg-black border border-cyan-900 p-4 rounded-2xl text-cyan-400 text-center mb-6 focus:border-cyan-400 outline-none font-mono text-xs">
            
            <button onclick="unlock()" class="w-full py-4 bg-cyan-500 text-black font-bold rounded-2xl uppercase font-hud text-xs tracking-widest shadow-lg shadow-cyan-500/20 active:scale-95 transition-all">
                Authorize Core
            </button>
            <p class="mt-6 text-[8px] text-gray-700 italic">This platform accepts any valid Gemini API Key.<br>Encryption: Local Browser Cache (Private).</p>
        </div>
    </div>

    <!-- SENSOR FEED -->
    <div class="relative flex-grow h-[60vh] bg-black">
        <video id="v" autoplay playsinline muted></video>
        <canvas id="c" class="hidden"></canvas>

        <!-- HUD ELEMENTS -->
        <div class="absolute inset-0 pointer-events-none">
            <div class="reticle">
                <div class="scan-bar"></div>
                <div class="corner top-0 left-0 border-t-4 border-l-4"></div>
                <div class="corner top-0 right-0 border-t-4 border-r-4"></div>
                <div class="corner bottom-0 left-0 border-b-4 border-l-4"></div>
                <div class="corner bottom-0 right-0 border-b-4 border-r-4"></div>
            </div>

            <!-- SHIP TELEMETRY -->
            <div class="absolute top-8 left-8 text-[9px] space-y-1 opacity-60">
                <div class="text-cyan-400">STATUS: INTERNET_CONNECTED</div>
                <div>LENS: S20_ULTRA_OMNI</div>
                <div>PROTOCOL: 0.9.32</div>
            </div>
        </div>

        <!-- PROCESSING OVERLAY -->
        <div id="loader" class="hidden absolute inset-0 bg-black/80 flex flex-col items-center justify-center z-50">
            <div class="w-14 h-14 border-2 border-cyan-900 rounded-full flex items-center justify-center">
                <div class="w-10 h-10 border-2 border-cyan-400 border-t-transparent rounded-full animate-spin"></div>
            </div>
            <p class="mt-6 text-[10px] tracking-[0.5em] animate-pulse text-cyan-400 font-bold">REASONING...</p>
        </div>
    </div>

    <!-- COMMAND CONSOLE -->
    <div class="flex-grow glass p-6 flex flex-col overflow-hidden">
        
        <div id="cmd-idle" class="flex flex-col items-center justify-center h-full">
            <div class="text-center mb-8">
                <h1 class="text-xl font-bold tracking-[0.3em] text-white font-hud">G-CORE OMNI</h1>
                <p class="text-[9px] text-cyan-900 uppercase tracking-widest">Multi-Object Neural Processor</p>
            </div>
            
            <button onclick="executeScan()" class="w-full max-w-sm py-5 border border-cyan-500/50 text-cyan-400 font-bold rounded-3xl flex items-center justify-center gap-3 active:scale-95 transition-all uppercase tracking-[0.3em] font-hud text-xs hover:bg-cyan-500/5">
                Execute Analysis
            </button>
            
            <button onclick="localStorage.removeItem('omni_key'); location.reload();" class="mt-10 text-[8px] text-gray-800 uppercase tracking-widest border-b border-transparent hover:border-red-900">Reset Neural Link</button>
        </div>

        <!-- OUTPUT REPORT -->
        <div id="cmd-report" class="hidden flex flex-col h-full overflow-hidden">
            <div class="flex justify-between items-center mb-4 border-b border-cyan-900/20 pb-3">
                <span class="text-[10px] font-bold tracking-widest text-white italic uppercase">Data Identification Report</span>
                <button onclick="abort()" class="text-[9px] text-cyan-600 font-bold">ABORT</button>
            </div>
            
            <div class="flex-1 overflow-y-auto" id="report-view">
                <div id="output-text" class="text-[11px] leading-relaxed text-gray-400"></div>
            </div>

            <div class="mt-4 pt-3 border-t border-cyan-900/20 flex gap-3">
                <button onclick="saveLog()" class="flex-1 py-3 bg-cyan-950/20 text-[9px] text-cyan-500 rounded-xl border border-cyan-900/50 uppercase font-bold">Save Log</button>
                <button onclick="webSearch()" class="flex-1 py-3 bg-cyan-950/20 text-[9px] text-cyan-500 rounded-xl border border-cyan-900/50 uppercase font-bold">Datasheet</button>
            </div>
        </div>
    </div>

    <script>
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        const gate = document.getElementById('gatekeeper');
        const idle = document.getElementById('cmd-idle');
        const rpt = document.getElementById('cmd-report');
        const ld = document.getElementById('loader');
        const out = document.getElementById('output-text');

        window.onload = () => {
            const k = localStorage.getItem('omni_key');
            if (k) {
                gate.style.opacity = '0';
                setTimeout(() => gate.style.display = 'none', 1000);
                init();
            }
        };

        function unlock() {
            const val = document.getElementById('master-key').value.trim();
            if (val) { localStorage.setItem('omni_key', val); location.reload(); }
        }

        async function init() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
                });
                v.srcObject = s;
            } catch (e) { alert("ERROR: Sensor initialization failed."); }
        }

        async function executeScan() {
            const k = localStorage.getItem('omni_key');
            ld.classList.remove('hidden');
            
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            const base64 = c.toDataURL('image/png').split(',')[1];

            // This prompt is optimized for any component/object identification
            const p = `ACT AS G-CORE UNIVERSAL EXPERT. 
            SCAN OBJECT. IDENTIFY PRECISELY. 
            REASONING: If electronics (MCUs, Gates, Passives), give pinout/logic. 
            If everyday object, give specs and material feel.
            FORMAT: IDENTITY: [Name] | TYPE: [Category] | DETAILS: [Bullet points of function/feel] | LOGIC: [If applicable]`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${k}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: p }, { inlineData: { mimeType: "image/png", data: base64 } }] }] })
                });
                const d = await res.json();
                if (d.error) throw new Error(d.error.message);

                out.innerHTML = d.candidates[0].content.parts[0].text
                    .replace(/\n/g, '<br>')
                    .replace(/\*\*(.*?)\*\*/g, '<span class="text-cyan-200">$1</span>');

                idle.classList.add('hidden');
                rpt.classList.remove('hidden');
            } catch (e) { 
                alert("PROTOCOL_FAULT: " + e.message); 
                if(e.message.includes("API_KEY_INVALID")) { localStorage.removeItem('omni_key'); location.reload(); }
            } finally { ld.classList.add('hidden'); }
        }

        function abort() { rpt.classList.add('hidden'); idle.classList.remove('hidden'); out.innerHTML = ""; }
        
        function saveLog() {
            const t = out.innerText;
            const b = document.createElement('textarea'); b.value = t; document.body.appendChild(b); b.select();
            document.execCommand('copy'); document.body.removeChild(b);
            alert("SUCCESS: Analysis data saved to local log (clipboard).");
        }

        function webSearch() {
            const lines = out.innerText.split('|');
            const target = lines[0].replace('IDENTITY:', '').trim();
            window.open(`https://www.google.com/search?q=${encodeURIComponent(target + " specifications datasheet")}`, '_blank');
        }
    </script>
</body>
</html>
